name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
  
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: taiki-e/install-action@cargo-hack
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
    - name: Build
      run: cargo hack build --feature-powerset --group-features async,tokio
    - name: Check formatting
      run: cargo fmt -- --check
    - name: Clippy
      run: cargo hack clippy --feature-powerset --group-features async,tokio --all-targets -- -Dclippy::all -D warnings
    - name: Test
      run: cargo test
      timeout-minutes: 2
    - name: Bench
      run: cargo bench
